<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>手游日报 · 投放总览</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%234578f9'/><path d='M16 40 L26 30 L34 36 L48 22' fill='none' stroke='%23fff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/zh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ko.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="app">
  <!-- ===== 左侧栏(AdPilot 风格) ===== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg class="sidebar-logo" viewBox="0 0 64 64" width="36" height="36">
        <rect width="64" height="64" rx="14" fill="var(--accent)"/>
        <path d="M16 42 L26 30 L34 37 L48 21" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name" data-i18n="brand">手游日报</div>
        <div class="sidebar-brand-tag" data-i18n="brandTag">VIGLOO · 投放数据</div>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-pane="overview" type="button">
        <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span>
        <span class="tab-label" data-i18n="navOverview">总览</span>
      </button>
      <button class="tab" data-pane="detail" type="button">
        <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
        <span class="tab-label" data-i18n="navDetail">明细</span>
      </button>
    </nav>

    <div class="sidebar-divider"></div>
    <div class="sidebar-footer">
      <div class="sidebar-stub">
        <span class="stub-dot"></span>
        <div>
          <div class="sidebar-stub-t" data-i18n="autoSync">每日自动同步</div>
          <div class="sidebar-stub-d"><span data-i18n="updatedAt">更新于</span> <span id="m-updated">—</span></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== 右侧内容 ===== -->
  <section class="content">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title" data-i18n="pageTitle">投放总览</h1>
        <div class="page-sub"><span data-i18n="dataRange">数据范围</span> · <span id="m-range">—</span></div>
      </div>
      <div class="page-header-right">
        <div class="lang-switch" role="group" aria-label="language">
          <button data-lang="zh" type="button">中</button>
          <button data-lang="ko" type="button">한</button>
        </div>
        <div class="theme-switch" role="group" aria-label="theme">
          <button class="theme-ico theme-ico-sun" data-theme="light" type="button" title="Light">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          </button>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="toggle theme"><span class="theme-toggle-dot"></span></button>
          <button class="theme-ico theme-ico-moon" data-theme="dark" type="button" title="Dark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ===== 总览 pane ===== -->
    <section class="pane" data-pane="overview">
      <!-- 筛选 -->
      <div class="cb-card filters">
        <div class="ctrl">
          <label class="ctrl-label" data-i18n="fDate">日期</label>
          <div class="date-row">
            <input type="text" id="date-range" class="date-range-input" readonly placeholder="选择日期范围">
            <button class="preset" data-preset="today" data-i18n="today">今日</button>
            <button class="preset" data-preset="yesterday" data-i18n="yesterday">昨日</button>
            <button class="preset" data-preset="7" data-i18n="p7">7日</button>
            <button class="preset" data-preset="14" data-i18n="p14">14日</button>
            <button class="preset" data-preset="30" data-i18n="p30">30日</button>
            <button class="preset" data-preset="all" data-i18n="pAll">全部</button>
          </div>
        </div>
        <div class="ctrl">
          <label class="ctrl-label" data-i18n="fCountry">国家</label>
          <div class="chips" id="country-chips"></div>
        </div>
        <div class="ctrl">
          <label class="ctrl-label" data-i18n="fDevice">设备</label>
          <div class="chips" id="device-chips"></div>
        </div>
        <div class="ctrl">
          <label class="ctrl-label" data-i18n="fSource">来源</label>
          <div class="seg" id="source-seg">
            <button data-v="both" class="on" data-i18n="sBoth">两者对比</button>
            <button data-v="adjust">ADJUST</button>
            <button data-v="meta">META</button>
          </div>
        </div>
        <div class="ctrl">
          <label class="ctrl-label" data-i18n="fRoas">ADJUST 回报口径</label>
          <div class="seg" id="roas-seg">
            <button data-v="d0_roas" class="on">D0</button>
            <button data-v="d3_roas">D3</button>
            <button data-v="d7_roas">D7</button>
          </div>
        </div>
      </div>

      <!-- KPI -->
      <section class="kpis" id="kpis"></section>

      <!-- ADJUST 回本曲线 -->
      <div class="cb-card" id="card-mat-adj">
        <div class="cb-card-head"><div>
          <div class="cb-card-title" data-i18n="cMatTitle">ADJUST 回本曲线 (D0 → D3 → D7)</div>
          <div class="cb-hint" data-i18n="cMatSub">ROAS 随天数成熟 · 100% = 回本线 · 虚线 = 预测(乘子模型)</div>
        </div></div>
        <div class="chart chart-main" id="chart-mat"></div>
      </div>

      <div class="grid-2">
        <div class="cb-card" id="card-mat-meta">
          <div class="cb-card-head"><div>
            <div class="cb-card-title" data-i18n="cMetaTitle">META 回收水平</div>
            <div class="cb-hint" data-i18n="cMetaSub">META 为单一 ROAS(无 D0/D3/D7 分级),按分段显示</div>
          </div></div>
          <div class="chart" id="chart-meta"></div>
        </div>
        <div class="cb-card">
          <div class="cb-card-head"><div><div class="cb-card-title" data-i18n="cMainTitle">花费 × 每日收支比</div><div class="cb-hint" data-i18n="cMainSub">柱 = 花费(左轴) · 线 = 收支比 ROAS(右轴)</div></div></div>
          <div class="chart" id="chart-spend"></div>
        </div>
      </div>

      <div class="cb-card">
        <div class="cb-card-head"><div><div class="cb-card-title" data-i18n="cBreakTitle">花费构成</div><div class="cb-hint" data-i18n="cBreakSub">按 国家 / 设备 分段堆叠</div></div></div>
        <div class="chart" id="chart-breakdown"></div>
      </div>
    </section>

    <!-- ===== 明细 pane ===== -->
    <section class="pane hidden" data-pane="detail">
      <div class="cb-card">
        <div class="cb-card-head"><div><div class="cb-card-title" data-i18n="cTableTitle">明细数据</div><div class="cb-hint" id="table-note">—</div></div></div>
        <div class="table-wrap">
          <table id="detail-table"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </section>

    <footer class="foot">
      <span data-i18n="footSrc">来源:飞书「手游日报」· 每日自动抓取</span>
      <span class="foot-dot">·</span>
      <span data-i18n="footImm">未成熟的 D3/D7 回报以 — 表示,不计入趋势线</span>
    </footer>
  </section>
</main>

<div id="loading" class="loading">…</div>
<script src="app.js"></script>
</body>
</html>
